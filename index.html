<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google" content="notranslate" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0", maximum-scale=1.0, user-scalable=no">
    <title>Invitación Cumple Noe</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="res/cd.svg" type="image/x-icon"/>

</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');
</style>

<body>
    <div id="container">
        <div id="content-wrapper">
                <svg id="katseye">
                    <defs>
                        <filter id="noise1">
                            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" />
                            <feDisplacementMap in="SourceGraphic" scale="8" />
                        </filter>
                        <filter id="noise2">
                            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" />
                            <feDisplacementMap in="SourceGraphic" scale="8" />
                        </filter>
                        <filter id="noise3">
                            <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="4" />
                            <feDisplacementMap in="SourceGraphic" scale="8" />
                        </filter>
                    </defs>
                </svg>
            <div>
                <h2>Te invito a celebrar mis</h2>
                <h1>21 años</h1>
            </div>
            <div>
                <div>
                    <p>Este 30 de abril a las 18:30,</p>
                    <p>en el <em><a id="link" href="https://maps.app.goo.gl/8QVQrQNWkHWpXT6YA" target="_blank">Club Hípico Los Sargentos.</a></em></p>
                    <p>No faltes!</p>
                    <img id="sign" src="res/sign.svg">
                </div>
            </div>
            <div>
                <div>
                    <h3>Por favor confirma tu asistencia!</h3> 
                    <input type="text" id="nombre" placeholder="Nombre">
                </div>
                <button id="button">Confirmar asistencia</button>
                <div id="message-success">Gracias por confirmar tu asistencia!</div>
            </div>
        </div>
    </div>

    <script type="module" src="js/script.js"></script>

</body>
</html>
